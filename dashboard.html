<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Klien - ShiftMaster SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-blue-900 text-white flex flex-col">
            <div class="p-6 text-2xl font-bold border-b border-blue-800">ShiftMaster</div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" class="block p-3 bg-blue-800 rounded">📊 Laporan Shift</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Dashboard Perusahaan</h1>
                <select id="tenantSelect" onchange="fetchReports()" class="p-2 border rounded shadow-sm">
                    <option value="1">PT Maju Mundur (Pabrik A)</option>
                    <option value="2">PT Sejahtera (Pabrik B)</option>
                </select>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Data Laporan Masuk</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full table-auto">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Operator</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Target</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Aktual</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Downtime</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Kendala</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function fetchReports() {
            const tenantId = document.getElementById('tenantSelect').value;
            const tableBody = document.getElementById('tableBody');
            
            try {
                const response = await fetch(`http://localhost:3000/api/reports/${tenantId}`);
                const data = await response.json();
                
                tableBody.innerHTML = ''; 
                
                if(data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Belum ada laporan.</td></tr>`;
                    return;
                }

                data.forEach(report => {
                    const tgl = new Date(report.tanggal).toLocaleString('id-ID');
                    let warnaAktual = report.aktual < report.target ? 'text-red-600 font-bold' : 'text-green-600 font-bold';

                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${tgl}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${report.nama_operator}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${report.target}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm ${warnaAktual}">${report.aktual}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${report.downtime} Menit</td>
                            <td class="px-6 py-4 text-sm text-gray-600">${report.kendala || '-'}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Gagal terhubung ke server.</td></tr>`;
            }
        }
        fetchReports();
    </script>
</body>
</html>
